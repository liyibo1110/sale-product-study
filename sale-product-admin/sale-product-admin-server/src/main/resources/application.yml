server:
  port: 8081

spring:
  application:
    name: sale-product-admin
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/products?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

dubbo:
  protocol:
    name: dubbo
    port: 20881
  registry:
    address: nacos://127.0.0.1:8848
  scan:
    base-packages: com.github.liyibo1110.saleproduct.admin.rpc

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: sale-product-admin-producer-group
